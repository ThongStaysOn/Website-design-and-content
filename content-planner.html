<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Kekspace — Content Planner</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg-0:#08080f;--bg-1:#0e0e1a;--bg-2:#151525;--bg-3:#1c1c32;--bg-4:#24243e;
  --tx-0:#f0f0f8;--tx-1:#b8b8d0;--tx-2:#7878a0;
  --green:#4ade80;--purple:#a855f7;--cyan:#22d3ee;--orange:#fb923c;--pink:#f472b6;--red:#ef4444;
  --font-mono:'JetBrains Mono',monospace;--font-sans:'DM Sans',sans-serif;
}
body{font-family:var(--font-sans);background:var(--bg-0);color:var(--tx-0);line-height:1.6;padding-bottom:80px}

.topbar{position:sticky;top:0;z-index:100;display:flex;align-items:center;justify-content:space-between;padding:12px 24px;background:rgba(14,14,26,.95);backdrop-filter:blur(8px);border-bottom:1px solid var(--bg-3)}
.topbar-title{font-family:var(--font-mono);font-weight:700;font-size:13px;color:var(--green);letter-spacing:.08em}
.topbar-right{display:flex;gap:8px}
.btn{font-family:var(--font-mono);font-size:11px;padding:6px 14px;border:1px solid var(--bg-4);background:var(--bg-2);color:var(--tx-1);border-radius:4px;cursor:pointer;transition:all .15s}
.btn:hover{background:var(--bg-3);color:var(--tx-0);border-color:var(--purple)}
.btn--green{background:var(--green);color:var(--bg-0);border-color:var(--green)}
.btn--green:hover{background:#22c55e}

.site-section{max-width:1000px;margin:0 auto;padding:48px 24px 0}
.site-section-header{display:flex;align-items:center;gap:14px;margin-bottom:8px;padding-bottom:14px;border-bottom:2px solid var(--purple)}
.site-section-num{background:var(--purple);color:var(--bg-0);font-weight:800;font-size:1.1rem;width:36px;height:36px;display:flex;align-items:center;justify-content:center;border-radius:4px;flex-shrink:0}
.site-section-title{font-size:1.3rem}
.site-section-desc{color:var(--tx-2);font-size:.85rem;margin-bottom:28px;padding-left:50px}

/* Slide card */
.slide{background:var(--bg-1);border:1px solid var(--bg-3);border-radius:8px;margin-bottom:24px;overflow:hidden}
.slide-img{width:100%;max-height:400px;object-fit:contain;background:var(--bg-2);display:block;border-bottom:1px solid var(--bg-3);cursor:pointer;transition:max-height .3s}
.slide-img.collapsed{max-height:60px;object-fit:cover}
.slide-meta{display:flex;align-items:center;justify-content:space-between;padding:10px 16px;background:var(--bg-2);border-bottom:1px solid var(--bg-3)}
.slide-name{font-family:var(--font-mono);font-size:.75rem;color:var(--tx-2)}
.slide-status{display:flex;gap:6px;align-items:center}

.badge{font-family:var(--font-mono);font-size:.6rem;font-weight:700;padding:2px 8px;border-radius:3px;text-transform:uppercase;letter-spacing:.04em}
.badge--approved{background:var(--green);color:var(--bg-0)}
.badge--draft{background:var(--orange);color:var(--bg-0)}
.badge--input{background:var(--pink);color:var(--bg-0)}
.badge--not-started{background:var(--bg-4);color:var(--tx-2)}

select.status-select{font-family:var(--font-mono);font-size:.65rem;padding:2px 6px;background:var(--bg-0);color:var(--tx-1);border:1px solid var(--bg-3);border-radius:3px;outline:none}

/* Content block within a slide */
.block{margin:0 16px 12px;background:var(--bg-0);border:1px solid var(--bg-3);border-radius:6px;overflow:hidden}
.block:first-of-type{margin-top:12px}
.block-label{font-family:var(--font-mono);font-size:.7rem;font-weight:600;color:var(--cyan);padding:8px 12px;background:var(--bg-2);border-bottom:1px solid var(--bg-3)}

.pair{padding:10px 12px}
.pair-label{font-family:var(--font-mono);font-size:.6rem;text-transform:uppercase;letter-spacing:.08em;margin-bottom:4px;font-weight:600}
.pair-label--old{color:var(--red)}
.pair-label--new{color:var(--green)}
.pair-text{background:var(--bg-2);border:1px solid var(--bg-3);border-radius:4px;padding:10px 12px;font-size:.85rem;color:var(--tx-1);line-height:1.7;min-height:40px}
.pair-text--old{opacity:.5;text-decoration:line-through}
.pair-text--new{border-color:var(--green);color:var(--tx-0);cursor:text}
.pair-text--new:focus{outline:2px solid var(--green);outline-offset:1px;background:var(--bg-1)}
.pair-text--new:hover{background:rgba(15,15,25,.8)}
.pair+.pair{border-top:1px solid var(--bg-3)}

/* Notes */
.slide-notes{margin:0 16px 16px;background:var(--bg-0);border:1px dashed var(--orange);border-radius:6px;padding:10px 12px}
.slide-notes-label{font-family:var(--font-mono);font-size:.6rem;color:var(--orange);text-transform:uppercase;letter-spacing:.08em;margin-bottom:4px;font-weight:600}
.slide-notes-text{font-size:.8rem;color:var(--tx-1);min-height:20px;cursor:text}
.slide-notes-text:focus{outline:1px solid var(--orange);outline-offset:2px}

.divider{height:1px;background:linear-gradient(90deg,transparent,var(--purple),transparent);margin:48px auto;max-width:500px}

.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--green);color:var(--bg-0);font-family:var(--font-mono);font-size:12px;font-weight:700;padding:8px 20px;border-radius:4px;opacity:0;transition:all .3s;z-index:999;pointer-events:none}
.toast.show{transform:translateX(-50%) translateY(0);opacity:1}

@media(max-width:768px){
  .site-section{padding:24px 12px 0}
  .slide-img{max-height:250px}
}
</style>
</head>

// Load saved edits from localStorage
let savedEdits={};
try{const s=localStorage.getItem(STORAGE_KEY);if(s)savedEdits=JSON.parse(s)}catch(e){}

function getKey(sectionIdx,slideIdx,blockIdx,field){
  return `${sectionIdx}-${slideIdx}-${blockIdx}-${field}`;
}
function getSaved(key,fallback){
  return savedEdits[key]!==undefined?savedEdits[key]:fallback;
}

function render(){
  const app=document.getElementById('app');
  let html='';

  SECTIONS.forEach((sec,si)=>{
    html+=`<div class="site-section">
      <div class="site-section-header">
        <div class="site-section-num">${sec.num}</div>
        <div class="site-section-title">${sec.title}</div>
      </div>
      <div class="site-section-desc">${sec.desc}</div>`;

    if(!sec.slides.length){
      html+=`<div style="color:var(--tx-2);font-size:.85rem;padding:16px 0 32px;font-style:italic">No slides for this section — text-only content handled in the site code.</div>`;
    }

    sec.slides.forEach((slide,sli)=>{
      const statusKey=`${si}-${sli}-status`;
      const notesKey=`${si}-${sli}-notes`;
      const currentStatus=getSaved(statusKey,slide.status);
      const currentNotes=getSaved(notesKey,slide.notes);
      const badgeClass=currentStatus==='Approved'?'badge--approved':currentStatus==='Draft'?'badge--draft':'badge--not-started';

      html+=`<div class="slide">
        <img class="slide-img" src="${slide.img}" alt="${slide.name}" loading="lazy" onclick="this.classList.toggle('collapsed')" title="Click to collapse/expand"/>
        <div class="slide-meta">
          <span class="slide-name">${slide.name}</span>
          <div class="slide-status">
            <select class="status-select" data-key="${statusKey}" onchange="onEdit(this.dataset.key,this.value)">
              <option${currentStatus==='Not started'?' selected':''}>Not started</option>
              <option${currentStatus==='Draft'?' selected':''}>Draft</option>
              <option${currentStatus==='Approved'?' selected':''}>Approved</option>
            </select>
          </div>
        </div>`;

      slide.blocks.forEach((block,bi)=>{
        const newKey=getKey(si,sli,bi,'new');
        const currentNew=getSaved(newKey,block.new_text);

        html+=`<div class="block">
          <div class="block-label">${block.label||'Content'}</div>`;

        if(block.old){
          html+=`<div class="pair">
            <div class="pair-label pair-label--old">Original</div>
            <div class="pair-text pair-text--old">${esc(block.old)}</div>
          </div>`;
        }

        html+=`<div class="pair">
            <div class="pair-label pair-label--new">New version</div>
            <div class="pair-text pair-text--new" contenteditable="true" data-key="${newKey}" oninput="onEdit(this.dataset.key,this.textContent)">${esc(currentNew)}</div>
          </div>
        </div>`;
      });

      html+=`<div class="slide-notes">
        <div class="slide-notes-label">Notes</div>
        <div class="slide-notes-text" contenteditable="true" data-key="${notesKey}" oninput="onEdit(this.dataset.key,this.textContent)">${esc(currentNotes)}</div>
      </div></div>`;
    });

    html+=`</div><div class="divider"></div>`;
  });

  app.innerHTML=html;
}

function esc(s){
  if(!s)return'';
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function onEdit(key,value){
  savedEdits[key]=value;
  dirty=true;
}

function saveAll(){
  localStorage.setItem(STORAGE_KEY,JSON.stringify(savedEdits));
  dirty=false;
  showToast('Saved');
}

function exportJSON(){
  const out=[];
  SECTIONS.forEach((sec,si)=>{
    sec.slides.forEach((slide,sli)=>{
      const entry={section:sec.title,image:slide.img,name:slide.name,status:getSaved(`${si}-${sli}-status`,slide.status),blocks:[],notes:getSaved(`${si}-${sli}-notes`,slide.notes)};
      slide.blocks.forEach((block,bi)=>{
        entry.blocks.push({label:block.label,original:block.old,rewrite:getSaved(getKey(si,sli,bi,'new'),block.new_text)});
      });
      out.push(entry);
    });
  });
  const blob=new Blob([JSON.stringify(out,null,2)],{type:'application/json'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url;
  a.download='kekspace-content-planner-'+new Date().toISOString().split('T')[0]+'.json';
  a.click();
  URL.revokeObjectURL(url);
  showToast('Exported');
}

function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2000);
}

document.addEventListener('keydown',e=>{
  if((e.metaKey||e.ctrlKey)&&e.key==='s'){e.preventDefault();saveAll()}
});
window.addEventListener('beforeunload',e=>{if(dirty){e.preventDefault();e.returnValue=''}});

render();
</script>
</body>
</html>
