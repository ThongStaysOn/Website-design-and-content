<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Kekspace — Content Planner</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg-0:#08080f;--bg-1:#0e0e1a;--bg-2:#151525;--bg-3:#1c1c32;--bg-4:#24243e;
  --tx-0:#f0f0f8;--tx-1:#b8b8d0;--tx-2:#7878a0;
  --green:#4ade80;--purple:#a855f7;--cyan:#22d3ee;--orange:#fb923c;--pink:#f472b6;--red:#ef4444;
  --font-mono:'JetBrains Mono',monospace;--font-sans:'DM Sans',sans-serif;
}
body{font-family:var(--font-sans);background:var(--bg-0);color:var(--tx-0);line-height:1.6;padding-bottom:80px}

.topbar{position:sticky;top:0;z-index:100;display:flex;align-items:center;justify-content:space-between;padding:12px 24px;background:rgba(14,14,26,.95);backdrop-filter:blur(8px);border-bottom:1px solid var(--bg-3)}
.topbar-left{display:flex;align-items:center;gap:14px}
.topbar-title{font-family:var(--font-mono);font-weight:700;font-size:13px;color:var(--green);letter-spacing:.08em}
.topbar-progress{display:flex;align-items:center;gap:8px}
.topbar-progress-bar{width:120px;height:6px;background:var(--bg-3);border-radius:3px;overflow:hidden}
.topbar-progress-fill{height:100%;background:linear-gradient(90deg,var(--green),var(--cyan));border-radius:3px;transition:width .3s}
.topbar-counter{font-family:var(--font-mono);font-size:10px;color:var(--tx-2)}
.topbar-right{display:flex;gap:8px}

/* Section nav — clear, tappable links */
.section-nav{position:sticky;top:49px;z-index:99;display:flex;gap:6px;padding:10px 24px;background:rgba(14,14,26,.95);backdrop-filter:blur(8px);border-bottom:2px solid var(--bg-3);overflow-x:auto}
.section-nav a{font-family:var(--font-mono);font-size:11px;padding:6px 14px;color:var(--tx-2);border:1px solid var(--bg-4);border-radius:4px;text-decoration:none;white-space:nowrap;transition:all .15s}
.section-nav a:hover,.section-nav a.active{color:var(--tx-0);border-color:var(--purple);background:var(--purple);color:var(--bg-0)}

#import-input{display:none}
.btn{font-family:var(--font-mono);font-size:11px;padding:6px 14px;border:1px solid var(--bg-4);background:var(--bg-2);color:var(--tx-1);border-radius:4px;cursor:pointer;transition:all .15s}
.btn:hover{background:var(--bg-3);color:var(--tx-0);border-color:var(--purple)}
.btn--green{background:var(--green);color:var(--bg-0);border-color:var(--green)}
.btn--green:hover{background:#22c55e}

/* Section — big visual break between sections */
.site-section{max-width:1000px;margin:0 auto;padding:60px 24px 0}
.site-section-header{display:flex;align-items:center;gap:14px;margin-bottom:8px;padding:16px 20px;background:var(--bg-1);border:2px solid var(--purple);border-radius:8px}
.site-section-num{background:var(--purple);color:var(--bg-0);font-weight:800;font-size:1.3rem;width:44px;height:44px;display:flex;align-items:center;justify-content:center;border-radius:6px;flex-shrink:0}
.site-section-title{font-size:1.4rem;font-weight:700}
.site-section-desc{color:var(--tx-2);font-size:.85rem;margin-bottom:28px;padding-left:58px}

/* Layout toggle */
.layout-toggle{font-family:var(--font-mono);font-size:10px;padding:4px 10px;background:var(--bg-2);color:var(--tx-2);border:1px solid var(--bg-3);border-radius:3px;cursor:pointer}
.layout-toggle:hover{border-color:var(--purple);color:var(--tx-0)}

/* Slide card — distinct cards with clear boundaries */
.slide{background:var(--bg-1);border:2px solid var(--bg-3);border-radius:10px;margin-bottom:32px;overflow:hidden;box-shadow:0 4px 16px rgba(0,0,0,.3)}
.slide--sidebyside{display:grid;grid-template-columns:1fr 1fr;grid-template-rows:auto 1fr auto}
.slide--sidebyside .slide-img{grid-row:1/3;max-height:none;height:100%;object-fit:cover;border-bottom:none;border-right:2px solid var(--bg-3)}
.slide--sidebyside .slide-meta{grid-column:2}
.slide--sidebyside .slide-blocks{grid-column:2}
.slide--sidebyside .slide-notes{grid-column:1/3}
.slide-img{width:100%;max-height:350px;object-fit:contain;background:var(--bg-0);display:block;border-bottom:2px solid var(--bg-3);cursor:pointer;transition:max-height .3s}
.slide-img.collapsed{max-height:50px;object-fit:cover;opacity:.4}

/* Image annotation system */
.slide-img-wrap{position:relative;border-bottom:2px solid var(--bg-3)}
.slide-img-wrap .slide-img{border-bottom:none}
.collapse-btn{position:absolute;top:8px;left:8px;background:rgba(8,8,15,.7);border:1px solid var(--bg-4);color:var(--tx-2);font-size:10px;width:24px;height:24px;border-radius:4px;cursor:pointer;z-index:5;display:flex;align-items:center;justify-content:center;transition:all .15s}
.collapse-btn:hover{background:rgba(8,8,15,.9);color:var(--tx-0);border-color:var(--purple)}
.slide-img-wrap .annotate-hint{position:absolute;top:8px;right:8px;font-family:var(--font-mono);font-size:9px;color:var(--tx-2);background:rgba(8,8,15,.7);padding:3px 8px;border-radius:3px;pointer-events:none;opacity:0;transition:opacity .2s}
.slide-img-wrap:hover .annotate-hint{opacity:1}
.pin{position:absolute;width:26px;height:26px;border-radius:50%;border:2px solid #fff;display:flex;align-items:center;justify-content:center;font-family:var(--font-mono);font-size:10px;font-weight:700;color:#fff;cursor:grab;z-index:10;box-shadow:0 2px 8px rgba(0,0,0,.5);transform:translate(-50%,-50%);transition:box-shadow .15s}
.pin:hover{box-shadow:0 2px 16px rgba(255,255,255,.3);z-index:11}
.pin:active{cursor:grabbing}
/* Pin bubble — always visible when has text, editable on click */
.pin-bubble{position:absolute;top:30px;left:0;background:rgba(8,8,15,.85);border:1.5px solid;border-radius:8px;padding:3px 7px;width:120px;z-index:15;box-shadow:0 2px 8px rgba(0,0,0,.4);pointer-events:none;font-family:var(--font-sans);font-size:.65rem;color:var(--tx-0);line-height:1.3;overflow:hidden;text-overflow:ellipsis;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical}
.pin-bubble::before{content:'';position:absolute;top:-5px;left:10px;width:8px;height:8px;background:rgba(8,8,15,.85);border-left:1.5px solid;border-top:1.5px solid;border-color:inherit;rotate:45deg}
.pin-bubble:empty{display:none}
.pin-edit{position:absolute;top:30px;left:50%;transform:translateX(-50%);background:rgba(8,8,15,.95);border:1.5px solid;border-radius:12px;padding:6px;min-width:160px;max-width:220px;z-index:20;box-shadow:0 4px 16px rgba(0,0,0,.6);display:none}
.pin-edit.open{display:block}
.pin-edit.open+.pin-bubble{display:none}
.pin-edit::before{content:'';position:absolute;top:-6px;left:50%;transform:translateX(-50%);width:10px;height:10px;background:rgba(8,8,15,.95);border-left:1.5px solid;border-top:1.5px solid;border-color:inherit;rotate:45deg}
.pin-edit textarea{width:100%;font-family:var(--font-sans);font-size:.75rem;background:transparent;color:var(--tx-0);border:none;padding:4px 6px;outline:none;resize:none;min-height:28px;max-height:80px;line-height:1.4}
.pin-edit textarea::placeholder{color:var(--tx-2);font-size:.7rem}
.pin--0 .pin-edit{border-color:#f472b6}.pin--1 .pin-edit{border-color:#a855f7}.pin--2 .pin-edit{border-color:#22d3ee}
.pin--3 .pin-edit{border-color:#4ade80}.pin--4 .pin-edit{border-color:#fb923c}.pin--5 .pin-edit{border-color:#ef4444}
.pin--6 .pin-edit{border-color:#eab308}.pin--7 .pin-edit{border-color:#06b6d4}.pin--8 .pin-edit{border-color:#8b5cf6}
.pin--9 .pin-edit{border-color:#ec4899}
.pin--0{background:#f472b6}.pin--1{background:#a855f7}.pin--2{background:#22d3ee}.pin--3{background:#4ade80}
.pin--4{background:#fb923c}.pin--5{background:#ef4444}.pin--6{background:#eab308}.pin--7{background:#06b6d4}
.pin--8{background:#8b5cf6}.pin--9{background:#ec4899}
/* Pin notes panel */
.pin-notes{margin:8px 16px;background:var(--bg-0);border:2px solid var(--bg-3);border-radius:8px;overflow:hidden}
.pin-notes-header{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;background:var(--bg-2);border-bottom:1px solid var(--bg-3)}
.pin-notes-title{font-family:var(--font-mono);font-size:.75rem;font-weight:700;color:var(--pink);text-transform:uppercase;letter-spacing:.06em}
.pin-note{display:flex;gap:10px;padding:10px 14px;border-bottom:1px solid var(--bg-3);align-items:flex-start}
.pin-note:last-child{border-bottom:none}
.pin-note-num{color:#fff;font-family:var(--font-mono);font-size:10px;font-weight:700;width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:2px}
.pin-note-num--0{background:#f472b6}.pin-note-num--1{background:#a855f7}.pin-note-num--2{background:#22d3ee}
.pin-note-num--3{background:#4ade80}.pin-note-num--4{background:#fb923c}.pin-note-num--5{background:#ef4444}
.pin-note-num--6{background:#eab308}.pin-note-num--7{background:#06b6d4}.pin-note-num--8{background:#8b5cf6}
.pin-note-num--9{background:#ec4899}
.pin-note-text{flex:1;font-family:var(--font-sans);font-size:.85rem;background:var(--bg-2);color:var(--tx-0);border:1px solid var(--bg-3);border-radius:4px;padding:8px 10px;outline:none;resize:none;min-height:32px;line-height:1.6;cursor:text}
.pin-note-text:focus{border-color:var(--pink);outline:1px solid var(--pink)}
.pin-note-text:empty::before{content:'Describe what needs to change here...';color:var(--tx-2);font-style:italic}
.pin-note-delete{background:none;border:none;color:var(--red);font-size:14px;cursor:pointer;opacity:.4;padding:4px;flex-shrink:0;margin-top:2px}
.pin-note-delete:hover{opacity:1}

/* Empty rewrite highlight */
.pair-text--new:empty::before,.pair-text--new.is-empty::before{content:'Needs rewrite...';color:var(--pink);opacity:.5;font-style:italic}
.pair-text--new.is-empty{border-color:var(--pink);border-style:dashed}

/* Add block button */
.add-block-btn{display:block;margin:0 16px 12px;padding:6px;text-align:center;font-family:var(--font-mono);font-size:.7rem;color:var(--tx-2);border:1px dashed var(--bg-4);border-radius:4px;cursor:pointer;background:transparent;width:calc(100% - 32px);transition:all .15s}
.add-block-btn:hover{border-color:var(--cyan);color:var(--cyan)}
.slide-meta{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;background:var(--bg-2);border-bottom:2px solid var(--bg-3)}
.slide-name{font-family:var(--font-mono);font-size:.8rem;color:var(--tx-0);font-weight:600}
.slide-status{display:flex;gap:8px;align-items:center}

.badge{font-family:var(--font-mono);font-size:.6rem;font-weight:700;padding:2px 8px;border-radius:3px;text-transform:uppercase;letter-spacing:.04em}
.badge--approved{background:var(--green);color:var(--bg-0)}
.badge--draft{background:var(--orange);color:var(--bg-0)}
.badge--input{background:var(--pink);color:var(--bg-0)}
.badge--not-started{background:var(--bg-4);color:var(--tx-2)}

select.status-select{font-family:var(--font-mono);font-size:.65rem;padding:2px 6px;background:var(--bg-0);color:var(--tx-1);border:1px solid var(--bg-3);border-radius:3px;outline:none}

/* Content block within a slide — visually distinct per block */
.block{margin:12px 16px;background:var(--bg-0);border:1px solid var(--bg-3);border-radius:8px;overflow:hidden;border-left:3px solid var(--cyan)}
.block-label{font-family:var(--font-mono);font-size:.8rem;font-weight:700;color:var(--cyan);padding:10px 14px;background:var(--bg-2);border-bottom:1px solid var(--bg-3);letter-spacing:.03em;cursor:text;outline:none}
.block-label:focus{background:var(--bg-1);outline:1px solid var(--cyan);outline-offset:-1px}
.block-label:hover{background:var(--bg-1)}

.pair{padding:12px 14px}
.pair-label{font-family:var(--font-mono);font-size:.65rem;text-transform:uppercase;letter-spacing:.08em;margin-bottom:6px;font-weight:700}
.pair-label--old{color:var(--red)}
.pair-label--new{color:var(--green)}
.pair-text{background:var(--bg-2);border:1px solid var(--bg-3);border-radius:4px;padding:12px 14px;font-size:.9rem;color:var(--tx-1);line-height:1.8;min-height:44px}
.pair-text--old{opacity:.4;text-decoration:line-through;font-size:.8rem}
.pair-text--new{border-color:var(--green);border-width:2px;color:var(--tx-0);cursor:text;font-size:.95rem}
.pair-text--new:focus{outline:2px solid var(--green);outline-offset:2px;background:var(--bg-1)}
.pair-text--new:hover{background:rgba(15,15,25,.8)}
.pair+.pair{border-top:1px dashed var(--bg-4);margin-top:4px}

/* Notes — clearly different from content blocks */
.slide-notes{margin:8px 16px 16px;background:var(--bg-2);border:2px dashed var(--orange);border-radius:8px;padding:12px 14px}
.slide-notes-label{font-family:var(--font-mono);font-size:.7rem;color:var(--orange);text-transform:uppercase;letter-spacing:.08em;margin-bottom:6px;font-weight:700}
.slide-notes-text{font-size:.85rem;color:var(--tx-1);min-height:24px;cursor:text;line-height:1.6}
.slide-notes-text:focus{outline:2px solid var(--orange);outline-offset:2px}

/* Section divider — big visual break */
.divider{height:3px;background:linear-gradient(90deg,transparent,var(--purple),transparent);margin:64px auto;max-width:600px}

.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--green);color:var(--bg-0);font-family:var(--font-mono);font-size:12px;font-weight:700;padding:8px 20px;border-radius:4px;opacity:0;transition:all .3s;z-index:999;pointer-events:none}
.toast.show{transform:translateX(-50%) translateY(0);opacity:1}

/* Light mode */
body.light{--bg-0:#f5f5f8;--bg-1:#ffffff;--bg-2:#eeeef2;--bg-3:#d8d8e0;--bg-4:#c8c8d0;--tx-0:#1a1a2e;--tx-1:#444466;--tx-2:#777799}
body.light .topbar,body.light .section-nav{background:rgba(245,245,248,.95)}
body.light .pair-text--old{opacity:.4}
body.light .pair-text--new{background:var(--bg-1)}

@media(max-width:768px){
  .site-section{padding:24px 12px 0}
  .slide-img{max-height:250px}
  .slide--sidebyside{grid-template-columns:1fr}
  .slide--sidebyside .slide-img{grid-row:auto;border-right:none;border-bottom:1px solid var(--bg-3);max-height:300px}
  .slide--sidebyside .slide-meta,.slide--sidebyside .slide-blocks,.slide--sidebyside .slide-notes{grid-column:1}
  .section-nav{gap:2px;padding:6px 12px}
}
</style>
</head>

<div class="topbar">
  <div class="topbar-left">
    <div class="topbar-title">KEKSPACE CONTENT PLANNER</div>
    <div class="topbar-progress">

      <span class="topbar-counter" id="progress-text"></span>
    </div>
  </div>
  <div class="topbar-right">
    <button class="layout-toggle" onclick="toggleLayout()" id="layout-btn" title="Toggle side-by-side view">Side-by-side</button>
    <button class="layout-toggle" onclick="toggleTheme()" id="theme-btn" title="Toggle light/dark">Light mode</button>
    <button class="btn" onclick="exportJSON()">Export</button>
    <button class="btn" onclick="document.getElementById('import-input').click()">Import</button>
    <input type="file" id="import-input" accept=".json" onchange="importJSON(event)"/>
    <button class="btn btn--green" onclick="saveAll()">Save (Cmd+S)</button>

</div>

<div class="section-nav" id="section-nav"></div>

<div id="app"></div>
<div class="toast" id="toast"></div>

// Load saved edits from localStorage
let savedEdits={};
try{const s=localStorage.getItem(STORAGE_KEY);if(s)savedEdits=JSON.parse(s)}catch(e){}

function getKey(sectionIdx,slideIdx,blockIdx,field){
  return `${sectionIdx}-${slideIdx}-${blockIdx}-${field}`;
}
function getSaved(key,fallback){
  return savedEdits[key]!==undefined?savedEdits[key]:fallback;
}

let sideBySide=false;
let lightMode=false;

function render(){
  // Section nav
  const nav=document.getElementById('section-nav');
  nav.innerHTML=SECTIONS.map((s,i)=>`<a href="#section-${i}">${s.num}. ${s.title.split('—')[0].trim()}</a>`).join('');

  const app=document.getElementById('app');
  let html='';

  SECTIONS.forEach((sec,si)=>{
    html+=`<div class="site-section" id="section-${si}">
      <div class="site-section-header">
        <div class="site-section-num">${sec.num}</div>
        <div class="site-section-title">${sec.title}</div>
      </div>
      <div class="site-section-desc">${sec.desc}</div>`;

    if(!sec.slides.length){
      html+=`<div style="color:var(--tx-2);font-size:.85rem;padding:16px 0 32px;font-style:italic">No slides for this section — text-only content handled in the site code.</div>`;
    }

    sec.slides.forEach((slide,sli)=>{
      const statusKey=`${si}-${sli}-status`;
      const notesKey=`${si}-${sli}-notes`;
      const currentStatus=getSaved(statusKey,slide.status);
      const currentNotes=getSaved(notesKey,slide.notes);

      const pinKey=`${si}-${sli}-pins`;
      const pins=getSavedPins(pinKey);

      html+=`<div class="slide${sideBySide?' slide--sidebyside':''}">
        <div class="slide-img-wrap" data-pin-key="${pinKey}" ondblclick="addPin(event,'${pinKey}',${si},${sli})">
          <img class="slide-img" src="${slide.img}" alt="${slide.name}" loading="lazy"/>
          <button class="collapse-btn" onclick="this.parentElement.querySelector('.slide-img').classList.toggle('collapsed')" title="Collapse/expand image">&#9660;</button>
          <div class="annotate-hint">Double-click to add pin</div>
          ${renderPins(pins,pinKey,si,sli)}
        </div>
        <div class="slide-meta">
          <span class="slide-name">${sec.num}.${sli+1} — ${slide.name}</span>
          <div class="slide-status">
            <select class="status-select" data-key="${statusKey}" onchange="onEdit(this.dataset.key,this.value);updateProgress()">
              <option${currentStatus==='Not started'?' selected':''}>Not started</option>
              <option${currentStatus==='Draft'?' selected':''}>Draft</option>
              <option${currentStatus==='Approved'?' selected':''}>Approved</option>
            </select>
          </div>
        </div>
        <div class="slide-blocks">`;

      slide.blocks.forEach((block,bi)=>{
        const newKey=getKey(si,sli,bi,'new');
        const currentNew=getSaved(newKey,block.new_text);
        const isEmpty=!currentNew||!currentNew.trim();

        html+=`<div class="block">
          <div class="block-label" contenteditable="true" data-label-si="${si}" data-label-sli="${sli}" data-label-bi="${bi}" oninput="onLabelEdit(${si},${sli},${bi},this.textContent)">${block.label||'Content'}</div>`;

        if(block.old){
          html+=`<div class="pair">
            <div class="pair-label pair-label--old">Original</div>
            <div class="pair-text pair-text--old">${esc(block.old)}</div>
          </div>`;
        }

        html+=`<div class="pair">
            <div class="pair-label pair-label--new">New version</div>
            <div class="pair-text pair-text--new${isEmpty?' is-empty':''}" contenteditable="true" data-key="${newKey}" oninput="onEdit(this.dataset.key,this.textContent);this.classList.toggle('is-empty',!this.textContent.trim())">${esc(currentNew)}</div>
          </div>
        </div>`;
      });

      html+=`<button class="add-block-btn" onclick="addBlock(${si},${sli})">+ Add content block</button>`;

      html+=`${renderPinNotes(pins,pinKey,si,sli)}</div><div class="slide-notes">
        <div class="slide-notes-label">Notes</div>
        <div class="slide-notes-text" contenteditable="true" data-key="${notesKey}" oninput="onEdit(this.dataset.key,this.textContent)">${esc(currentNotes)}</div>
      </div></div>`;
    });

    html+=`</div><div class="divider"></div>`;
  });

  app.innerHTML=html;
  updateProgress();
}

function addBlock(si,sli){
  const slide=SECTIONS[si].slides[sli];
  const bi=slide.blocks.length;
  slide.blocks.push({label:'Untitled',old:'',new_text:''});
  render();
  // Focus the label so they can name it right away
  const labelEl=document.querySelectorAll(`[data-label-si="${si}"][data-label-sli="${sli}"]`);
  const last=labelEl[labelEl.length-1];
  if(last){last.scrollIntoView({behavior:'smooth',block:'center'});last.focus();document.execCommand('selectAll')}
}

function updateProgress(){
  let total=0,approved=0,drafts=0;
  SECTIONS.forEach((sec,si)=>{
    sec.slides.forEach((slide,sli)=>{
      total++;
      const status=getSaved(`${si}-${sli}-status`,slide.status);
      if(status==='Approved')approved++;
      else if(status==='Draft')drafts++;
    });
  });
  const pct=total>0?(approved/total)*100:0;
  document.getElementById('progress-fill').style.width=pct+'%';
  document.getElementById('progress-text').textContent=`${approved}/${total} approved · ${drafts} drafts`;
}

function toggleLayout(){
  sideBySide=!sideBySide;
  document.getElementById('layout-btn').textContent=sideBySide?'Stacked':'Side-by-side';
  render();
}

function toggleTheme(){
  lightMode=!lightMode;
  document.body.classList.toggle('light',lightMode);
  document.getElementById('theme-btn').textContent=lightMode?'Dark mode':'Light mode';
}

function importJSON(e){
  const file=e.target.files[0];
  if(!file)return;
  const reader=new FileReader();
  reader.onload=function(ev){
    try{
      const arr=JSON.parse(ev.target.result);
      if(Array.isArray(arr)){
        // Map imported data back to savedEdits keys
        let idx=0;
        SECTIONS.forEach((sec,si)=>{
          sec.slides.forEach((slide,sli)=>{
            if(idx<arr.length){
              const item=arr[idx];
              savedEdits[`${si}-${sli}-status`]=item.status||'Not started';
              savedEdits[`${si}-${sli}-notes`]=item.notes||'';
              if(item.blocks){
                item.blocks.forEach((b,bi)=>{
                  savedEdits[getKey(si,sli,bi,'new')]=b.rewrite||'';
                });
              }
            }
            idx++;
          });
        });
      }
      saveAll();
      render();
      showToast('Imported');
    }catch(err){showToast('Import failed: '+err.message)}
  };
  reader.readAsText(file);
  e.target.value='';
}

function esc(s){
  if(!s)return'';
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function onEdit(key,value){
  savedEdits[key]=value;
  dirty=true;
}

function saveAll(){
  localStorage.setItem(STORAGE_KEY,JSON.stringify(savedEdits));
  dirty=false;
  showToast('Saved');
}

function exportJSON(){
  const out=[];
  SECTIONS.forEach((sec,si)=>{
    sec.slides.forEach((slide,sli)=>{
      const entry={section:sec.title,image:slide.img,name:slide.name,status:getSaved(`${si}-${sli}-status`,slide.status),blocks:[],notes:getSaved(`${si}-${sli}-notes`,slide.notes)};
      slide.blocks.forEach((block,bi)=>{
        entry.blocks.push({label:block.label,original:block.old,rewrite:getSaved(getKey(si,sli,bi,'new'),block.new_text)});
      });
      out.push(entry);
    });
  });
  const blob=new Blob([JSON.stringify(out,null,2)],{type:'application/json'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url;
  a.download='kekspace-content-planner-'+new Date().toISOString().split('T')[0]+'.json';
  a.click();
  URL.revokeObjectURL(url);
  showToast('Exported');
}

function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2000);
}

// Pin annotation system
function getSavedPins(key){
  const raw=savedEdits[key];
  if(!raw)return[];
  try{return JSON.parse(raw)}catch(e){return[]}
}

function savePins(key,pins){
  savedEdits[key]=JSON.stringify(pins);
  dirty=true;
}

function renderPins(pins,pinKey,si,sli){
  return pins.map((p,i)=>`
    <div class="pin pin--${i%10}" style="left:${p.x}%;top:${p.y}%" data-pin-idx="${i}" data-pin-key="${pinKey}"
      onmousedown="startDragPin(event,${i},'${pinKey}',${si},${sli})"
      onclick="togglePinEdit(event,this)">
      ${i+1}
      <div class="pin-edit" onclick="event.stopPropagation()">
        <textarea placeholder="Type note..." oninput="updatePinText('${pinKey}',${i},this.value,${si},${sli})">${esc(p.text)}</textarea>
      </div>
      <div class="pin-bubble">${esc(p.text)}</div>
    </div>`).join('');
}

function renderPinNotes(pins,pinKey,si,sli){
  if(!pins.length)return'';
  let html=`<div class="pin-notes"><div class="pin-notes-header"><span class="pin-notes-title">Image Notes</span></div>`;
  pins.forEach((p,i)=>{
    html+=`<div class="pin-note">
      <span class="pin-note-num pin-note-num--${i%10}">${i+1}</span>
      <div class="pin-note-text" contenteditable="true" data-pinkey="${pinKey}" data-pinidx="${i}" oninput="updatePinText('${pinKey}',${i},this.textContent,${si},${sli})">${esc(p.text)}</div>
      <button class="pin-note-delete" onclick="deletePin('${pinKey}',${i},${si},${sli})" title="Remove pin">&times;</button>
    </div>`;
  });
  html+=`</div>`;
  return html;
}

function addPin(e,pinKey,si,sli){
  // Don't add pin if clicking on a pin, tooltip, button, or textarea
  if(e.target.closest('.pin')||e.target.closest('.pin-tooltip')||e.target.tagName==='BUTTON'||e.target.tagName==='TEXTAREA')return;
  const wrap=e.currentTarget;
  const img=wrap.querySelector('.slide-img');
  if(img.classList.contains('collapsed'))return;
  const rect=wrap.getBoundingClientRect();
  const x=((e.clientX-rect.left)/rect.width)*100;
  const y=((e.clientY-rect.top)/rect.height)*100;
  const pins=getSavedPins(pinKey);
  pins.push({x:Math.round(x*10)/10,y:Math.round(y*10)/10,text:''});
  savePins(pinKey,pins);
  render();
  // Focus the new pin's textarea
  setTimeout(()=>{
    const allPins=document.querySelectorAll(`[data-pin-key="${pinKey}"]`);
    const last=allPins[allPins.length-1];
    if(last){const ta=last.querySelector('textarea');if(ta)ta.focus()}
  },50);
}

function updatePinText(pinKey,idx,text,si,sli){
  const pins=getSavedPins(pinKey);
  if(pins[idx])pins[idx].text=text;
  savePins(pinKey,pins);
  const wrap=document.querySelector(`[data-pin-key="${pinKey}"]`);
  if(wrap){
    const pinEls=wrap.querySelectorAll('.pin');
    if(pinEls[idx]){
      // Sync bubble
      const bubble=pinEls[idx].querySelector('.pin-bubble');
      if(bubble)bubble.textContent=text;
      // Sync edit textarea
      const ta=pinEls[idx].querySelector('.pin-edit textarea');
      if(ta&&ta!==document.activeElement)ta.value=text;
    }
  }
  // Sync notes panel
  const noteEl=document.querySelector(`.pin-note-text[data-pinkey="${pinKey}"][data-pinidx="${idx}"]`);
  if(noteEl&&noteEl!==document.activeElement)noteEl.textContent=text;
}

function deletePin(pinKey,idx,si,sli){
  const pins=getSavedPins(pinKey);
  pins.splice(idx,1);
  savePins(pinKey,pins);
  render();
}

function onLabelEdit(si,sli,bi,text){
  SECTIONS[si].slides[sli].blocks[bi].label=text;
  dirty=true;
  onEdit(`${si}-${sli}-label-${bi}`,text);
}

function togglePinEdit(e,pinEl){
  if(e.target.tagName==='TEXTAREA')return;
  if(didDrag)return;
  const edit=pinEl.querySelector('.pin-edit');
  // Close all other open edits
  document.querySelectorAll('.pin-edit.open').forEach(el=>{
    if(el!==edit)el.classList.remove('open');
  });
  edit.classList.toggle('open');
  if(edit.classList.contains('open')){
    const ta=edit.querySelector('textarea');
    if(ta)setTimeout(()=>ta.focus(),50);
  }
}

// Close pin edits when clicking outside
document.addEventListener('click',e=>{
  if(!e.target.closest('.pin')){
    document.querySelectorAll('.pin-edit.open').forEach(el=>el.classList.remove('open'));
  }
});

let dragState=null;
let didDrag=false;
function startDragPin(e,idx,pinKey,si,sli){
  if(e.target.tagName==='TEXTAREA'||e.target.tagName==='BUTTON')return;
  e.preventDefault();
  didDrag=false;
  const wrap=e.currentTarget.parentElement;
  const rect=wrap.getBoundingClientRect();
  dragState={idx,pinKey,si,sli,rect,wrap};
  document.addEventListener('mousemove',onDragPin);
  document.addEventListener('mouseup',stopDragPin);
}
function onDragPin(e){
  if(!dragState)return;
  didDrag=true;
  const{idx,pinKey,rect}=dragState;
  const x=Math.max(0,Math.min(100,((e.clientX-rect.left)/rect.width)*100));
  const y=Math.max(0,Math.min(100,((e.clientY-rect.top)/rect.height)*100));
  const pins=getSavedPins(pinKey);
  if(pins[idx]){
    pins[idx].x=Math.round(x*10)/10;
    pins[idx].y=Math.round(y*10)/10;
    savePins(pinKey,pins);
    // Update pin position live without full re-render
    const pin=dragState.wrap.querySelectorAll('.pin')[idx];
    if(pin){pin.style.left=x+'%';pin.style.top=y+'%'}
  }
}
function stopDragPin(){
  dragState=null;
  document.removeEventListener('mousemove',onDragPin);
  document.removeEventListener('mouseup',stopDragPin);
}

document.addEventListener('keydown',e=>{
  if((e.metaKey||e.ctrlKey)&&e.key==='s'){e.preventDefault();saveAll()}
});
window.addEventListener('beforeunload',e=>{if(dirty){e.preventDefault();e.returnValue=''}});

// Scroll spy for section nav
function updateNavHighlight(){
  const sections=document.querySelectorAll('.site-section');
  const links=document.querySelectorAll('.section-nav a');
  const scrollPos=window.scrollY+120;
  let activeIdx=0;
  sections.forEach((sec,i)=>{
    if(scrollPos>=sec.offsetTop)activeIdx=i;
  });
  links.forEach((l,i)=>{
    l.classList.toggle('active',i===activeIdx);
  });
}
window.addEventListener('scroll',()=>{requestAnimationFrame(updateNavHighlight)},{passive:true});

render();
setTimeout(updateNavHighlight,100);
</script>
